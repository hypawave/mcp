name: Publish to MCP Registry

# Publishes server.json to registry.modelcontextprotocol.io under the
# io.github.hypawave/* namespace via GitHub Actions OIDC — the only auth path
# that grants an org namespace without the (private, uninstallable) registry
# GitHub App seeing the org. Run AFTER the matching version is on npm: the
# registry validates that the npm package version in server.json exists.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for mcp-publisher login github-oidc
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
